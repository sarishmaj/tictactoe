<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
      letter-spacing: 0.1em;
      color: #e94560;
    }

    #status {
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      height: 1.6rem;
      color: #a8dadc;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 8px;
    }

    .cell {
      background: #16213e;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #0f3460;
      transform: scale(1.04);
    }

    .cell.x { color: #e94560; }
    .cell.o { color: #a8dadc; }

    .cell.win {
      background: #0f3460;
      box-shadow: 0 0 18px rgba(233, 69, 96, 0.6);
      animation: pulse 0.5s ease;
    }

    @keyframes pulse {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.12); }
      100% { transform: scale(1); }
    }

    #restart {
      margin-top: 1.8rem;
      padding: 0.65rem 2.2rem;
      font-size: 1rem;
      border: none;
      border-radius: 8px;
      background: #e94560;
      color: #fff;
      cursor: pointer;
      letter-spacing: 0.05em;
      transition: background 0.15s, transform 0.1s;
    }

    #restart:hover {
      background: #c73652;
      transform: scale(1.04);
    }

    #scores {
      display: flex;
      gap: 2.5rem;
      margin-bottom: 1.5rem;
      font-size: 1rem;
    }

    .score-box {
      text-align: center;
    }

    .score-label {
      color: #888;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .score-value {
      font-size: 1.8rem;
      font-weight: bold;
    }

    #scores .score-box:nth-child(1) .score-value { color: #e94560; }
    #scores .score-box:nth-child(2) .score-value { color: #aaa; }
    #scores .score-box:nth-child(3) .score-value { color: #a8dadc; }
  </style>
</head>
<body>
  <h1>Tic Tac Toe</h1>

  <div id="scores">
    <div class="score-box">
      <div class="score-label">X</div>
      <div class="score-value" id="scoreX">0</div>
    </div>
    <div class="score-box">
      <div class="score-label">Draws</div>
      <div class="score-value" id="scoreDraw">0</div>
    </div>
    <div class="score-box">
      <div class="score-label">O</div>
      <div class="score-value" id="scoreO">0</div>
    </div>
  </div>

  <div id="status">X's turn</div>

  <div id="board">
    <div class="cell" data-i="0"></div>
    <div class="cell" data-i="1"></div>
    <div class="cell" data-i="2"></div>
    <div class="cell" data-i="3"></div>
    <div class="cell" data-i="4"></div>
    <div class="cell" data-i="5"></div>
    <div class="cell" data-i="6"></div>
    <div class="cell" data-i="7"></div>
    <div class="cell" data-i="8"></div>
  </div>

  <button id="restart">New Game</button>

  <script>
    const WINS = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];

    let board, current, over;
    const scores = { X: 0, O: 0, Draw: 0 };

    const cells   = document.querySelectorAll('.cell');
    const status  = document.getElementById('status');
    const scoreX  = document.getElementById('scoreX');
    const scoreO  = document.getElementById('scoreO');
    const scoreDraw = document.getElementById('scoreDraw');

    function init() {
      board   = Array(9).fill('');
      current = 'X';
      over    = false;
      cells.forEach(c => {
        c.textContent = '';
        c.className   = 'cell';
      });
      status.textContent = "X's turn";
    }

    function checkWin(player) {
      return WINS.find(combo => combo.every(i => board[i] === player)) || null;
    }

    function handleClick(e) {
      const i = +e.target.dataset.i;
      if (over || board[i]) return;

      board[i] = current;
      e.target.textContent = current;
      e.target.classList.add(current.toLowerCase(), 'taken');

      const winCombo = checkWin(current);
      if (winCombo) {
        winCombo.forEach(idx => cells[idx].classList.add('win'));
        status.textContent = `${current} wins!`;
        scores[current]++;
        updateScores();
        over = true;
        return;
      }

      if (board.every(v => v)) {
        status.textContent = "It's a draw!";
        scores.Draw++;
        updateScores();
        over = true;
        return;
      }

      current = current === 'X' ? 'O' : 'X';
      status.textContent = `${current}'s turn`;
    }

    function updateScores() {
      scoreX.textContent    = scores.X;
      scoreO.textContent    = scores.O;
      scoreDraw.textContent = scores.Draw;
    }

    cells.forEach(c => c.addEventListener('click', handleClick));
    document.getElementById('restart').addEventListener('click', init);

    init();
  </script>
</body>
</html>
